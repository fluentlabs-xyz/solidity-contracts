[profile.default]
ast = true
build_info = true
cache_path = "forge-cache"
evm_version = "cancun"
extra_output = ["storageLayout"]
ffi = true
fs_permissions = [
  {access = "read-write", path = "./deployments"},
  {access = "read-write", path = "./config"},
  {access = "read", path = "./forge-out"},
]
libs = ["lib"]
optimizer = true
optimizer_runs = 200
out = "forge-out"
script = "scripts"
solc_version = "0.8.30"
src = "contracts"
test = "test"

[rpc_endpoints]
# Fork targets for dual-fork e2e tests
l1 = "https://ethereum-sepolia-rpc.publicnode.com"
l2 = "https://rpc.dev.fluent.xyz"

# Additional named endpoints (optional env-driven)
fluentDev = "${RPC_URL_FLUENT_DEV}"
fluentTestnet = "${RPC_URL_FLUENT_TESTNET}"
mainnet = "${MAINNET_RPC}"
sepolia = "${RPC_URL_SEPOLIA_ETH}"

[etherscan]
sepolia = {key = "${ETHERSCAN_API_KEY}"}

[profile.coverage]
via_ir = true
