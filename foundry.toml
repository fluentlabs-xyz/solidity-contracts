[profile.default]
# Required by OpenZeppelin Foundry Upgrades plugin:
#   ast, build_info, extra_output — storage layout validation for UUPS upgrades
#   ffi — plugin runs `npx @openzeppelin/upgrades-core validate` via FFI
ast = true
build_info = true
cache_path = "cache"
evm_version = "prague"
extra_output = ["storageLayout"]
ffi = true
fs_permissions = [
  {access = "read-write", path = "./deployments"},
  {access = "read-write", path = "./scripts/config"},
  {access = "read", path = "./broadcast"},
  {access = "read", path = "./out"},
]
libs = ["lib"]
no_match_coverage = "(test|script|ExcessivelySafeCall)"
optimizer = true
optimizer_runs = 200
script = "scripts"
solc_version = "0.8.30"
src = "contracts"
test = "test"
via_ir = true

[rpc_endpoints]
# Fork targets for dual-fork e2e tests
l1 = "https://ethereum-sepolia-rpc.publicnode.com"
l2 = "https://rpc.dev.fluent.xyz"

# Additional named endpoints (optional env-driven)
fluentDev = "${FLUENT_DEV_RPC_URL}"
fluentTestnet = "${FLUENT_TESTNET_RPC_URL}"
mainnet = "${MAINNET_RPC}"
sepolia = "${RPC_URL_SEPOLIA_ETH}"

[etherscan]
sepolia = {key = "${ETHERSCAN_API_KEY}"}

[profile.coverage]
via_ir = true
