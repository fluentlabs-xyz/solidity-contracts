[profile.default]
cache_path = "forge-cache"
evm_version = "cancun"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
out = "forge-out"
script = "scripts"
solc_version = "0.8.30"
src = "contracts"
test = "test"

[rpc_endpoints]
# Local dev forks (used by e2e tests)
l1 = "http://127.0.0.1:9545"
l2 = "http://127.0.0.1:9546"

# Remote networks migrated from Hardhat config
mainnet = "${MAINNET_RPC}"
sepoliaEth = "${RPC_URL_SEPOLIA_ETH}"
fluentTestnet = "${RPC_URL_FLUENT_TESTNET}"
fluentDev = "${RPC_URL_FLUENT_DEV}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
